<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        label {
            font-weight: bold;
        }
        button {
            margin-right: 10px;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário HTML</title>
</head>
<body>
<h1 style="text-align: center;">Formulário HTML</h1>   
<fieldset style="background-color: rgb(226, 228, 227);"> 
    <form>
        <label for="nome">Nome:</label>
        <input type="text" placeholder="Digite seu nome completo" required>
        <br><br>
        <label>Sexo:</label>
        <input type="radio" value="feminino" name="sexo" id="fem" required>
        <label for="fem">Feminino</label>
        <input type="radio" value="masculino" name="sexo" id="masc" required>
        <label for="masc">Masculino</label>
        <br><br>        
        <label>Estado Civil:</label>
        <select required>
            <option value="">Selecione...</option>
            <option value="solteiro">Solteiro</option>
            <option value="casado">Casado</option>
            <option value="viúvo">Viúvo</option>
            <option value="divorciado">Divorciado</option>
            <option value="outro">Outro</option>
        </select>
        <br><br>
        <label for="email">E-mail:</label>
        <input type="text" placeholder="exemplo@email.com" required>
        <br><br>
        <label for="text">Endereço:</label>
        <input type="text" required>
        <br><br>
        <label>Número:</label>
        <input type="number" min="1" required>
        <br><br>
        <label>Data de Nascimento:</label>
        <input type="date" required>
        <br><br>
        <label>Número de Telefone:</label>
        <input type="tel" placeholder="(11) 9XXXX-XXXX" required>
        <br><br>
        <label>Página pessoal:</label>
        <input type="url" placeholder="https://www.exemplo.com">
        <br><br>
        <button type="submit" style="background-color: lightgreen;">Cadastrar</button><button type="reset" style="background-color: lightcoral;">Limpar Tudo</button>
    </form>  
    </fieldset>  
</body>
</html>
